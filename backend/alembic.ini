# A generic, single-database configuration.

[alembic]
# path to migration scripts
script_location = backend/alembic

# template used to generate migration files
# file_template = %%(rev)s_%%(slug)s

# sys.path path, required to import app modules
prepend_sys_path = .

# timezone to use when rendering dates within templates
# timezone =

# database connection url
sqlalchemy.url = postgresql://postgres:postgres@localhost:5432/vishakan_db

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = INFO
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(asctime)s [%(levelname)s] %(name)s: %(message)s
datefmt = %H:%M:%S
